<!doctype html><html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Časovrstvy</title><style>html,body{margin:0;height:100%;background:#f6f7fb;color:#171a23;font-family:system-ui,sans-serif}.loading{height:100%;display:grid;place-items:center}.loading b{font-size:20px}</style></head><body><div class="loading"><b>Načítám Časovrstvy…</b></div><!-- production:consolidated --><script>
fetch('https://raw.githubusercontent.com/ellaaep/casovrstvy/eacb4831721371cdbe7fbd5aecdcddf70e60dc0b/index.html?production=1',{cache:'no-store'})
.then(response=>{if(!response.ok)throw new Error('Načtení aplikace selhalo');return response.text()})
.then(source=>{

</script></body></html>
