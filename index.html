;\n    Object.entries(configs).forEach(([scope,cfg])=>{const lane=document.createElement('div');lane.className=`history-lane ${scope}`;lane.style.cssText=`top:${cfg.top}px;height:${cfg.height}px;--lane-color:${cfg.color}`;const axis=document.createElement('i');axis.className='history-lane-axis';axis.style.top=(cfg.axis-cfg.top)+'px';const label=document.createElement('span');label.className='history-lane-label';label.textContent=cfg.label;lane.append(axis,label);host.appendChild(lane)});\n    list.forEach(event=>{const scope=eventScope(event),cfg=configs[scope],x=xFor((event.start+event.end)/2,w),dot=document.createElement('a'),size=event.importance>=5?13:event.importance===4?10:event.importance===3?8:6;dot.className='event-dot'+(event.importance>=5?' is-major':event.importance===4?' is-important':'');dot.href=event.wiki;dot.target='_blank';dot.rel='noopener noreferrer';dot.dataset.kind='event';dot.dataset.id=event.id;dot.style.cssText=`left:${x}px;top:${cfg.axis}px;width:${size}px;height:${size}px;--event:${cfg.color}`;dot.onmouseenter=e=>showTip(e,event,event.display,event.summary);dot.onmousemove=moveTip;dot.onmouseleave=hideTip;host.appendChild(dot)});\n    const threshold=span()>700?5:span()>380?4:span()>180?4:3;\n    ['czech','world','tech'].forEach(scope=>{\n      const cfg=configs[scope],rowCount=3,cardH=42,rowGap=4,topPad=4,rowTop=Array.from({length:rowCount},(_,i)=>cfg.top+topPad+i*(cardH+rowGap)),occupied=Array.from({length:rowCount},()=>[]);\n      const candidates=list.filter(event=>eventScope(event)===scope&&event.importance>=threshold).sort((a,b)=>b.importance-a.importance||a.start-b.start||a.title.localeCompare(b.title,'cs'));\n      candidates.forEach(event=>{\n        const x=xFor((event.start+event.end)/2,w),width=clamp((event.importance>=5?176:152)*itemScale,138,198),left=clamp(x-width/2,EDGE_GUTTER,w-width-EDGE_GUTTER),interval={left,right:left+width};let row=-1;\n        for(let i=0;i<rowCount;i++){if(!occupied[i].some(other=>intervalsOverlap(i
